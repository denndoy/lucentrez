# Development Docker Compose (optional, for local testing)
# Note: For Coolify deployment, environment variables are configured in Coolify Dashboard
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - coolify
      - default

networks:
  coolify:
    external: true
