# Development Docker Compose (optional, for local testing)
# Note: For Coolify deployment, environment variables are configured in Coolify Dashboard
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "6969:6969"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: redis-server --requirepass 9phjbBYIKcvlU1lj3AOslVQCtRhQL3hRI3Ia68YQE2/O8dTa7lv8zyxNq4k+sggBiWI7TCJ6fz5a3bJqpuAV6Q==
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
