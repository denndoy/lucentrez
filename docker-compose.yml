# Development Docker Compose (optional, for local testing)
# Note: For Coolify deployment, environment variables are configured in Coolify Dashboard
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "6969:6969"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: redis-server --requirepass WShMXcggDS54pWznFfHadk1uFYQomyi0dbty8xvfUckNF8Wkr2QRFu2oGBwiMdkx
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
